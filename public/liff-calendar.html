<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>受取日を選択</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .wrap {
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 18px 16px 20px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .sub {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .notice {
      background: #fff4d6;
      color: #7a5b00;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .hidden {
      display: none;
    }

    .nav {
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .navBtn {
      border: none;
      border-radius: 12px;
      background: #f1f1f1;
      height: 42px;
      font-size: 24px;
      cursor: pointer;
    }

    .navBtn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .monthLabel {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .weekdays,
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekdays {
      margin-bottom: 8px;
    }

    .weekday {
      text-align: center;
      font-size: 12px;
      color: #777;
      padding: 4px 0;
      font-weight: 600;
    }

    .dayCell {
      aspect-ratio: 1 / 1;
    }

    .dayBtn,
    .dayBlank {
      width: 100%;
      height: 100%;
      min-height: 46px;
      border-radius: 14px;
    }

    .dayBlank {
      background: transparent;
    }

    .dayBtn {
      border: 1px solid #e5e5e5;
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .dayBtn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .dayBtn.today {
      border: 2px solid #06c755;
    }

    .dayBtn.selected {
      background: #06c755;
      border-color: #06c755;
      color: #fff;
    }

    .dayBtn:disabled {
      background: #f3f3f3;
      color: #bbb;
      border-color: #eee;
      cursor: not-allowed;
    }

    .selectedText {
      margin-top: 16px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      min-height: 24px;
    }

    .submitBtn {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 14px;
      background: #06c755;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 16px;
      cursor: pointer;
    }

    .submitBtn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">受取日を選択</div>
      <div id="subText" class="sub">読み込み中です…</div>
      <div id="notice" class="notice hidden"></div>

      <div class="nav">
        <button id="prevBtn" class="navBtn" type="button">‹</button>
        <div id="monthLabel" class="monthLabel"></div>
        <button id="nextBtn" class="navBtn" type="button">›</button>
      </div>

      <div class="weekdays">
        <div class="weekday">日</div>
        <div class="weekday">月</div>
        <div class="weekday">火</div>
        <div class="weekday">水</div>
        <div class="weekday">木</div>
        <div class="weekday">金</div>
        <div class="weekday">土</div>
      </div>

      <div id="calendar" class="calendar"></div>

      <div id="selectedText" class="selectedText">日付を選択してください</div>
      <button id="submitBtn" class="submitBtn" type="button" disabled>この日付を送信</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const state = {
      currentMonthDate: null,
      selectedDate: null,
      minDate: null,
      maxDate: null,
      config: null
    };

    function normalizeDate(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return normalizeDate(d);
    }

    function formatIso(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatDisplay(date) {
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function sameDay(a, b) {
      return formatIso(a) === formatIso(b);
    }

    function isSelectable(date) {
      return date >= state.minDate && date <= state.maxDate;
    }

    function showNotice(message) {
      const el = document.getElementById("notice");
      el.textContent = message;
      el.classList.remove("hidden");
    }

    function updateSelectedText() {
      const el = document.getElementById("selectedText");
      if (!state.selectedDate) {
        el.textContent = "日付を選択してください";
        return;
      }
      el.textContent = `選択中: ${formatDisplay(state.selectedDate)}`;
    }

    function updateNavButtons() {
      const currentMonthStart = new Date(
        state.currentMonthDate.getFullYear(),
        state.currentMonthDate.getMonth(),
        1
      );
      const minMonthStart = new Date(
        state.minDate.getFullYear(),
        state.minDate.getMonth(),
        1
      );
      const maxMonthStart = new Date(
        state.maxDate.getFullYear(),
        state.maxDate.getMonth(),
        1
      );

      document.getElementById("prevBtn").disabled = currentMonthStart <= minMonthStart;
      document.getElementById("nextBtn").disabled = currentMonthStart >= maxMonthStart;
    }

    function renderCalendar() {
      const calendar = document.getElementById("calendar");
      const monthLabel = document.getElementById("monthLabel");
      calendar.innerHTML = "";

      const year = state.currentMonthDate.getFullYear();
      const month = state.currentMonthDate.getMonth();

      monthLabel.textContent = `${year}年 ${month + 1}月`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const today = normalizeDate(new Date());

      for (let i = 0; i < firstDay; i++) {
        const blank = document.createElement("div");
        blank.className = "dayCell";
        blank.innerHTML = '<div class="dayBlank"></div>';
        calendar.appendChild(blank);
      }

      for (let day = 1; day <= lastDate; day++) {
        const dateObj = normalizeDate(new Date(year, month, day));
        const cell = document.createElement("div");
        cell.className = "dayCell";

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "dayBtn";
        btn.textContent = day;

        if (sameDay(dateObj, today)) {
          btn.classList.add("today");
        }

        if (state.selectedDate && sameDay(dateObj, state.selectedDate)) {
          btn.classList.add("selected");
        }

        if (!isSelectable(dateObj)) {
          btn.disabled = true;
        } else {
          btn.addEventListener("click", () => {
            state.selectedDate = dateObj;
            document.getElementById("submitBtn").disabled = false;
            updateSelectedText();
            renderCalendar();
          });
        }

        cell.appendChild(btn);
        calendar.appendChild(cell);
      }

      updateSelectedText();
      updateNavButtons();
    }

    async function sendSelectedDate() {
      if (!state.selectedDate) return;

      if (!liff.isInClient()) {
        alert("LINEアプリ内で開いてください。");
        return;
      }

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.textContent = "送信中…";

      try {
        const selected = formatIso(state.selectedDate);

        await liff.sendMessages([
          {
            type: "text",
            text: selected
          }
        ]);

        liff.closeWindow();
      } catch (error) {
        console.error(error);
        alert("送信に失敗しました。もう一度お試しください。");
        submitBtn.disabled = false;
        submitBtn.textContent = "この日付を送信";
      }
    }

    async function init() {
      try {
        const res = await fetch("/api/liff-config");
        const config = await res.json();
        state.config = config;

        const today = normalizeDate(new Date());
        const count = Number(config.bookableDateCount || 10);

        state.minDate = today;
        state.maxDate = addDays(today, Math.max(0, count - 1));
        state.currentMonthDate = new Date(today.getFullYear(), today.getMonth(), 1);

        document.getElementById("subText").textContent =
          `選択できる日付: ${formatIso(state.minDate)} ～ ${formatIso(state.maxDate)}`;

        if (!config.liffId) {
          throw new Error("LIFF_ID が未設定です");
        }

        await liff.init({ liffId: config.liffId });

        if (!liff.isInClient()) {
          showNotice("この画面はLINEアプリ内で開くのがおすすめです。外部ブラウザでは送信できないことがあります。");
        }

        renderCalendar();
      } catch (error) {
        console.error(error);
        document.getElementById("subText").textContent = "初期化に失敗しました";
        showNotice("LIFFの設定を確認してください。");
      }
    }

    document.getElementById("prevBtn").addEventListener("click", () => {
      state.currentMonthDate = new Date(
        state.currentMonthDate.getFullYear(),
        state.currentMonthDate.getMonth() - 1,
        1
      );
      renderCalendar();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      state.currentMonthDate = new Date(
        state.currentMonthDate.getFullYear(),
        state.currentMonthDate.getMonth() + 1,
        1
      );
      renderCalendar();
    });

    document.getElementById("submitBtn").addEventListener("click", sendSelectedDate);

    init();
  </script>
</body>
</html>
