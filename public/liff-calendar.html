<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>受取日を選択</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --green: #16a34a;
      --green-dark: #15803d;
      --bg: #f6fbf7;
      --line: #d9e7dc;
      --text: #1f2937;
      --muted: #6b7280;
      --disabled: #e5e7eb;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 28px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      padding: 16px;
    }
    .title {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 6px;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 14px;
      line-height: 1.6;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    .month-title {
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      flex: 1;
    }
    .nav-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      min-width: 44px;
      height: 44px;
      font-size: 18px;
      cursor: pointer;
    }
    .weekday, .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .weekday div {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding-bottom: 6px;
      font-weight: 700;
    }
    .day {
      border: 1px solid var(--line);
      border-radius: 12px;
      min-height: 58px;
      background: #fff;
      cursor: pointer;
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: .15s;
    }
    .day:hover { transform: translateY(-1px); }
    .day .num {
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }
    .day .label {
      font-size: 11px;
      color: var(--green-dark);
      font-weight: 700;
      line-height: 1;
    }
    .day.disabled {
      background: #f3f4f6;
      color: #9ca3af;
      border-color: #eceff2;
      cursor: not-allowed;
    }
    .day.disabled .label { color: #9ca3af; }
    .day.selected {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .day.selected .label { color: #dcfce7; }
    .day.outside {
      visibility: hidden;
    }
    .footer {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }
    .selected-text {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      min-height: 22px;
    }
    .primary-btn, .secondary-btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary-btn {
      background: var(--green);
      color: #fff;
    }
    .primary-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .secondary-btn {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .error {
      margin-top: 10px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
      white-space: pre-wrap;
    }
    .loading {
      padding: 24px 0;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">受取日を選択</h1>
      <p class="sub">
        営業日だけ選べます。<br>
        カレンダーで日付を選んで「この日で決定」を押してください。
      </p>

      <div id="loading" class="loading">読み込み中...</div>

      <div id="calendarArea" style="display:none;">
        <div class="toolbar">
          <button id="prevBtn" class="nav-btn" type="button">‹</button>
          <div id="monthTitle" class="month-title"></div>
          <button id="nextBtn" class="nav-btn" type="button">›</button>
        </div>

        <div class="weekday">
          <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
        </div>

        <div id="grid" class="grid"></div>

        <div class="footer">
          <div id="selectedText" class="selected-text">日付を選んでください</div>
          <button id="sendBtn" class="primary-btn" disabled>この日で決定</button>
          <button id="closeBtn" class="secondary-btn" type="button">閉じる</button>
        </div>

        <div class="note">
          ※ 定休日・受付対象外の日付は選べません。<br>
          ※ 送信後はLINEトークに戻って、受取時間を選んでください。
        </div>
        <div id="error" class="error"></div>
      </div>
    </div>
  </div>

  <script>
    // 作成した LIFF ID に置き換え
    const LIFF_ID = 'YOUR_LIFF_ID';

    let availableDates = [];
    let availableSet = new Set();
    let selectedDate = '';
    let currentYear = 0;
    let currentMonth = 0; // 0-11

    const loadingEl = document.getElementById('loading');
    const calendarAreaEl = document.getElementById('calendarArea');
    const monthTitleEl = document.getElementById('monthTitle');
    const gridEl = document.getElementById('grid');
    const selectedTextEl = document.getElementById('selectedText');
    const sendBtnEl = document.getElementById('sendBtn');
    const errorEl = document.getElementById('error');

    document.getElementById('prevBtn').addEventListener('click', () => moveMonth(-1));
    document.getElementById('nextBtn').addEventListener('click', () => moveMonth(1));
    document.getElementById('sendBtn').addEventListener('click', sendSelectedDate);
    document.getElementById('closeBtn').addEventListener('click', () => {
      if (window.liff && liff.isInClient()) {
        liff.closeWindow();
      } else {
        window.close();
      }
    });

    init();

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const res = await fetch('/api/booking-config');
        const json = await res.json();

        if (!json.ok || !Array.isArray(json.dates) || !json.dates.length) {
          throw new Error('営業日データを取得できませんでした。');
        }

        availableDates = json.dates.map(x => x.date);
        availableSet = new Set(availableDates);

        const first = parseYmd(availableDates[0]);
        currentYear = first.getFullYear();
        currentMonth = first.getMonth();

        loadingEl.style.display = 'none';
        calendarAreaEl.style.display = 'block';

        renderCalendar();
      } catch (err) {
        loadingEl.style.display = 'none';
        calendarAreaEl.style.display = 'block';
        errorEl.textContent = err.message || String(err);
      }
    }

    function moveMonth(delta) {
      const d = new Date(currentYear, currentMonth + delta, 1);
      currentYear = d.getFullYear();
      currentMonth = d.getMonth();
      renderCalendar();
    }

    function renderCalendar() {
      gridEl.innerHTML = '';
      errorEl.textContent = '';

      const firstDay = new Date(currentYear, currentMonth, 1);
      const lastDay = new Date(currentYear, currentMonth + 1, 0);
      const startWeekday = firstDay.getDay();
      const totalDays = lastDay.getDate();

      monthTitleEl.textContent = `${currentYear}年 ${currentMonth + 1}月`;

      for (let i = 0; i < startWeekday; i++) {
        const empty = document.createElement('div');
        empty.className = 'day outside';
        gridEl.appendChild(empty);
      }

      for (let day = 1; day <= totalDays; day++) {
        const d = new Date(currentYear, currentMonth, day);
        const ymd = formatYmd(d);
        const enabled = availableSet.has(ymd);

        const cell = document.createElement('button');
        cell.type = 'button';
        cell.className = 'day' + (enabled ? '' : ' disabled') + (selectedDate === ymd ? ' selected' : '');
        if (!enabled) cell.disabled = true;

        const num = document.createElement('div');
        num.className = 'num';
        num.textContent = day;

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = enabled ? '予約可' : '不可';

        cell.appendChild(num);
        cell.appendChild(label);

        if (enabled) {
          cell.addEventListener('click', () => {
            selectedDate = ymd;
            selectedTextEl.textContent = `選択中：${ymd}`;
            sendBtnEl.disabled = false;
            renderCalendar();
          });
        }

        gridEl.appendChild(cell);
      }
    }

    async function sendSelectedDate() {
      if (!selectedDate) return;

      try {
        errorEl.textContent = '';
        sendBtnEl.disabled = true;

        // テキストメッセージなので webhook が飛ぶ
        await liff.sendMessages([
          {
            type: 'text',
            text: `予約日 ${selectedDate}`
          }
        ]);

        selectedTextEl.textContent = `送信しました：${selectedDate}`;
        setTimeout(() => {
          if (liff.isInClient()) {
            liff.closeWindow();
          }
        }, 700);
      } catch (err) {
        sendBtnEl.disabled = false;
        errorEl.textContent =
          '送信に失敗しました。\n' +
          'LINEトークから開き直してもう一度お試しください。';
      }
    }

    function parseYmd(ymd) {
      const [y, m, d] = ymd.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function formatYmd(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }
  </script>
</body>
</html>
