<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>受取日時を選択</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f7f4ea;
      color: #2f2a24;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #fffdf7;
      border-radius: 22px;
      padding: 18px;
      border: 1px solid #efe5c8;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .sub {
      font-size: 13px;
      color: #7a6f60;
      margin-bottom: 16px;
      line-height: 1.7;
    }

    .status {
      margin-bottom: 14px;
      padding: 11px 13px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.7;
      background: #f4efe1;
      color: #6b5f51;
      display: none;
      border: 1px solid #eadfbb;
    }

    .status.show {
      display: block;
    }

    .status.error {
      background: #fff1f2;
      color: #b42318;
      border: 1px solid #fecdd3;
    }

    .step {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .step span {
      padding: 7px 11px;
      border-radius: 999px;
      background: #efe9d8;
      font-size: 12px;
      font-weight: 700;
      color: #6f6559;
    }

    .step .active {
      background: #06c755;
      color: #fff;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
    }

    .nav button {
      border: none;
      background: #2f2a24;
      color: #fff;
      padding: 10px 13px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .nav button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .month-label {
      font-weight: 800;
      font-size: 19px;
      text-align: center;
      flex: 1;
      color: #2f2a24;
    }

    .weekdays,
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekdays div {
      text-align: center;
      font-size: 12px;
      color: #7c7266;
      padding: 4px 0;
      font-weight: 700;
    }

    .day,
    .blank {
      min-height: 64px;
      border-radius: 16px;
    }

    .blank {
      background: transparent;
    }

    .day {
      border: 1px solid #e8dfc7;
      background: #faf7ef;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      cursor: pointer;
      position: relative;
      padding: 0;
      font-size: 16px;
      color: #2f2a24;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .day:not(.disabled):active {
      transform: scale(0.98);
    }

    .day.disabled {
      color: #c0b8ad;
      background: #f0ece5;
      cursor: not-allowed;
    }

    .day.available {
      background: #fffdf7;
      border: 2px solid rgba(6, 199, 85, 0.18);
    }

    .day.today {
      outline: 2px solid #d7a928;
      outline-offset: -2px;
    }

    .day.selected {
      background: #06c755;
      color: #fff;
      border-color: #06c755;
      box-shadow: 0 8px 18px rgba(6, 199, 85, 0.24);
    }

    .day .marker {
      position: absolute;
      bottom: 7px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #06c755;
    }

    .day.selected .marker {
      background: #fff;
    }

    .section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #eee2c6;
    }

    .hidden {
      display: none;
    }

    .confirm-box,
    .final-box {
      border-radius: 16px;
      padding: 14px;
    }

    .confirm-box {
      background: #f7faf8;
      border: 1px solid #d9efe1;
    }

    .confirm-date {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-primary {
      background: #06c755;
      color: #fff;
    }

    .btn-secondary {
      background: #ece7dc;
      color: #2f2a24;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .time-btn {
      border: 1px solid #e4dcc7;
      background: #fffdf7;
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      font-weight: 800;
      cursor: pointer;
      line-height: 1.2;
      min-height: 56px;
      color: #2f2a24;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .time-btn:active {
      transform: scale(0.98);
    }

    .time-btn.selected {
      background: #f2c94c;
      color: #2f2a24;
      border-color: #f2c94c;
    }

    .time-btn small {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.75;
      font-weight: 600;
    }

    .final-box {
      margin-top: 14px;
      background: #fff9ed;
      border: 1px solid #f0dfb4;
    }

    .final-box strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .send-area {
      margin-top: 14px;
    }

    .send-area button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #2f2a24;
      color: #fff;
      padding: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
    }

    .send-area button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .empty-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 14px;
      background: #f9f7f1;
      border: 1px dashed #d8ccb0;
      color: #6f6559;
      line-height: 1.7;
      display: none;
    }

    .empty-box.show {
      display: block;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 253, 247, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-overlay.is-hidden {
      display: none;
    }

    .loading-card {
      background: #fffdf7;
      border: 1px solid #efe5c8;
      border-radius: 20px;
      padding: 22px 24px;
      min-width: 220px;
      text-align: center;
      box-shadow: 0 10px 28px rgba(0,0,0,0.10);
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 4px solid #eadfbb;
      border-top-color: #d7a928;
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.9s linear infinite;
    }

    .loading-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #2f2a24;
    }

    .loading-text {
      font-size: 13px;
      color: #7a6f60;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 520px) {
      .time-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .day,
      .blank {
        min-height: 54px;
      }

      .nav {
        gap: 6px;
      }

      .nav button {
        padding: 8px 10px;
        font-size: 12px;
      }

      .month-label {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay is-hidden">
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-title" id="loadingTitle">読み込み中…</div>
      <div class="loading-text" id="loadingText">少し待ってね</div>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="title" id="titleText">受取日時を選択</div>
      <div class="sub">ご希望の受取日と時間をお選びください</div>

      <div class="status" id="statusBox"></div>

      <div class="step" id="stepBar">
        <span class="active">1. 日付</span>
        <span>2. 確認</span>
        <span>3. 時間</span>
        <span>4. 送信</span>
      </div>

      <div class="nav">
        <button id="prevBtn" type="button">← 前月</button>
        <div class="month-label" id="monthLabel"></div>
        <button id="nextBtn" type="button">次月 →</button>
      </div>

      <div class="weekdays">
        <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
      </div>

      <div class="calendar" id="calendar"></div>
      <div class="empty-box" id="emptyBox">現在選択できる営業日がありません。</div>

      <div class="section hidden" id="dateConfirmSection">
        <div class="confirm-box">
          <div class="confirm-date" id="selectedDateText"></div>
          <div class="btn-row">
            <button class="btn btn-primary" id="confirmDateBtn" type="button">この日でOK</button>
            <button class="btn btn-secondary" id="reselectDateBtn" type="button">日付を選び直す</button>
          </div>
        </div>
      </div>

      <div class="section hidden" id="timeSection">
        <div style="font-weight:800; font-size:18px;">受取時間を選択</div>
        <div class="sub" id="timeSubText">時間をお選びください</div>
        <div class="time-grid" id="timeGrid"></div>

        <div class="final-box hidden" id="finalBox">
          <strong>この内容で送信します</strong>
          <div id="finalText"></div>
        </div>

        <div class="send-area">
          <button id="sendBtn" type="button" disabled>この内容で送信する</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_TIME_SLOTS = [
      "11:30",
      "11:45",
      "12:00",
      "12:15",
      "12:30",
      "12:45",
      "13:00",
      "13:15",
      "13:30",
      "13:45",
      "14:00",
      "14:15",
      "14:30",
      "14:45",
      "15:00",
      "15:15",
      "15:30",
      "15:45",
      "16:00",
      "16:15",
      "16:30",
      "16:45",
      "17:00",
      "17:15",
      "17:30",
      "17:45",
      "18:00"
    ];

    let liffId = "";
    let storeName = "かむらど";
    let availableDates = new Set();
    let timeSlots = [...DEFAULT_TIME_SLOTS];
    let pickupTimesByDate = {};
    let sameDayLeadMinutes = 30;
    let todayJst = "";

    let currentDate = new Date();
    currentDate.setDate(1);

    let selectedDate = "";
    let selectedTime = "";

    const titleText = document.getElementById("titleText");
    const statusBox = document.getElementById("statusBox");
    const emptyBox = document.getElementById("emptyBox");
    const monthLabel = document.getElementById("monthLabel");
    const calendar = document.getElementById("calendar");
    const stepBar = document.getElementById("stepBar");
    const dateConfirmSection = document.getElementById("dateConfirmSection");
    const timeSection = document.getElementById("timeSection");
    const selectedDateText = document.getElementById("selectedDateText");
    const timeSubText = document.getElementById("timeSubText");
    const timeGrid = document.getElementById("timeGrid");
    const finalBox = document.getElementById("finalBox");
    const finalText = document.getElementById("finalText");
    const sendBtn = document.getElementById("sendBtn");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const loadingTitle = document.getElementById("loadingTitle");
    const loadingText = document.getElementById("loadingText");

    document.getElementById("prevBtn").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    document.getElementById("confirmDateBtn").addEventListener("click", async () => {
      try {
        setLoading(true, "時間を確認中…", "少し待ってね");
        await wait(120);

        const slots = getTimeSlotsForDate(selectedDate);

        if (!slots.length) {
          timeSection.classList.add("hidden");
          finalBox.classList.add("hidden");
          sendBtn.disabled = true;
          showStatus("その日の受付可能時間はありません。別日を選んでください。", true);
          return;
        }

        timeSection.classList.remove("hidden");
        timeSubText.textContent = buildTimeSubText(selectedDate);
        renderTimeSlots();
        setStep(3);
        hideStatus();
      } finally {
        setLoading(false);
      }
    });

    document.getElementById("reselectDateBtn").addEventListener("click", () => {
      dateConfirmSection.classList.add("hidden");
      timeSection.classList.add("hidden");
      finalBox.classList.add("hidden");
      selectedTime = "";
      sendBtn.disabled = true;
      setStep(1);
      hideStatus();
    });

    sendBtn.addEventListener("click", async () => {
      if (!selectedDate || !selectedTime) return;

      try {
        sendBtn.disabled = true;
        setLoading(true, "送信中…", "少し待ってね");
        await liff.sendMessages([
          {
            type: "text",
            text: `予約日時|${selectedDate}|${selectedTime}`
          }
        ]);
        liff.closeWindow();
      } catch (err) {
        showStatus(`送信に失敗しました。${err?.message || err}`, true);
        sendBtn.disabled = false;
      } finally {
        setLoading(false);
      }
    });

    async function initPage() {
      try {
        setLoading(true, "読み込み中…", "少し待ってね");
        showStatus("営業日を読み込んでいます…");

        const config = await fetchConfig();

        liffId = config.liffId || "";
        storeName = config.storeName || "かむらど";
        sameDayLeadMinutes = Number(config.sameDayLeadMinutes || 30);
        todayJst = normalizeDate(config.todayJst || "");

        timeSlots =
          Array.isArray(config.pickupTimes) && config.pickupTimes.length
            ? config.pickupTimes
            : [...DEFAULT_TIME_SLOTS];

        pickupTimesByDate = normalizePickupTimesByDate(config.pickupTimesByDate || {});

        const rawAvailableDates = Array.isArray(config.availableDates)
          ? config.availableDates
          : [];

        const normalizedDates = rawAvailableDates
          .map(normalizeDate)
          .filter((value) => /^\d{4}-\d{2}-\d{2}$/.test(value));

        const filteredDates = normalizedDates.filter((date) => {
          return getTimeSlotsForDate(date).length > 0;
        });

        availableDates = new Set(filteredDates);

        if (!availableDates.size) {
          const datesFromPickupMap = Object.keys(pickupTimesByDate).filter((date) => {
            return /^\d{4}-\d{2}-\d{2}$/.test(date) && getTimeSlotsForDate(date).length > 0;
          });
          availableDates = new Set(datesFromPickupMap);
        }

        titleText.textContent = `${storeName} 受取日時選択`;
        moveCalendarToFirstAvailableMonth();

        if (!liffId) {
          throw new Error("LIFF_ID が設定されていません。");
        }

        await liff.init({ liffId });
        renderCalendar();

        if (!availableDates.size) {
          emptyBox.classList.add("show");
          showStatus("現在選択できる営業日がありません。", true);
          return;
        }

        hideStatus();
      } catch (err) {
        console.error(err);
        showStatus(`初期化に失敗しました。${err?.message || err}`, true);
      } finally {
        setLoading(false);
      }
    }

    async function fetchConfig() {
      const response = await fetch("/api/liff-config", {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("設定の取得に失敗しました。");
      }

      return response.json();
    }

    function normalizePickupTimesByDate(map) {
      const out = {};

      Object.entries(map || {}).forEach(([date, times]) => {
        const normalizedDate = normalizeDate(date);

        if (!/^\d{4}-\d{2}-\d{2}$/.test(normalizedDate)) return;

        out[normalizedDate] = Array.isArray(times)
          ? times.map((t) => String(t || "").trim()).filter(Boolean)
          : [];
      });

      return out;
    }

    function moveCalendarToFirstAvailableMonth() {
      const dates = [...availableDates].sort();

      if (!dates.length) return;

      const [year, month] = dates[0].split("-").map(Number);
      currentDate = new Date(year, month - 1, 1);
    }

    function renderCalendar() {
      calendar.innerHTML = "";

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      monthLabel.textContent = `${year}年 ${month + 1}月`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i += 1) {
        const blank = document.createElement("div");
        blank.className = "blank";
        calendar.appendChild(blank);
      }

      let hasAvailableThisMonth = false;

      for (let day = 1; day <= lastDate; day += 1) {
        const dateStr = formatDateISO(new Date(year, month, day));
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "day";
        cell.textContent = day;

        const isAvailable = availableDates.has(dateStr) && getTimeSlotsForDate(dateStr).length > 0;
        const isToday = todayJst && dateStr === todayJst;

        if (isToday) {
          cell.classList.add("today");
        }

        if (!isAvailable) {
          cell.classList.add("disabled");
          cell.disabled = true;
        } else {
          hasAvailableThisMonth = true;
          cell.classList.add("available");

          const marker = document.createElement("span");
          marker.className = "marker";
          cell.appendChild(marker);

          if (selectedDate === dateStr) {
            cell.classList.add("selected");
          }

          cell.addEventListener("click", () => {
            selectedDate = dateStr;
            selectedTime = "";
            renderCalendar();

            dateConfirmSection.classList.remove("hidden");
            timeSection.classList.add("hidden");
            finalBox.classList.add("hidden");
            sendBtn.disabled = true;

            selectedDateText.textContent = `${formatDateJP(selectedDate)} でよろしいですか？`;
            setStep(2);
            hideStatus();
          });
        }

        calendar.appendChild(cell);
      }

      emptyBox.classList.toggle("show", availableDates.size === 0 || !hasAvailableThisMonth);
    }

    function renderTimeSlots() {
      timeGrid.innerHTML = "";

      const slots = getTimeSlotsForDate(selectedDate);

      if (!slots.length) {
        finalBox.classList.add("hidden");
        sendBtn.disabled = true;
        showStatus("この日の受付可能時間はありません。別日を選んでください。", true);
        return;
      }

      slots.forEach((time) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "time-btn";
        btn.innerHTML = `${time}<small>受取</small>`;

        if (selectedTime === time) {
          btn.classList.add("selected");
        }

        btn.addEventListener("click", async () => {
          try {
            setLoading(true, "確認中…", "少し待ってね");
            await wait(120);

            selectedTime = time;
            renderTimeSlots();

            finalBox.classList.remove("hidden");
            finalText.textContent = `${formatDateJP(selectedDate)} / ${selectedTime}`;
            sendBtn.disabled = false;
            setStep(4);
            hideStatus();
          } finally {
            setLoading(false);
          }
        });

        timeGrid.appendChild(btn);
      });
    }

    function getTimeSlotsForDate(dateStr) {
      const normalizedDate = normalizeDate(dateStr);

      if (!normalizedDate) return [];

      if (Array.isArray(pickupTimesByDate[normalizedDate])) {
        return pickupTimesByDate[normalizedDate];
      }

      if (todayJst && normalizedDate === todayJst) {
        return [];
      }

      return [...timeSlots];
    }

    function buildTimeSubText(dateStr) {
      if (todayJst && normalizeDate(dateStr) === todayJst) {
        return `${formatDateJP(dateStr)} の受取時間を選んでください（本日は現在時刻の${sameDayLeadMinutes}分後以降のみ）`;
      }

      return `${formatDateJP(dateStr)} の受取時間を選んでください`;
    }

    function setStep(step) {
      const spans = [...stepBar.querySelectorAll("span")];
      spans.forEach((el, idx) => {
        el.classList.toggle("active", idx < step);
      });
    }

    function showStatus(message, isError = false) {
      statusBox.textContent = message;
      statusBox.className = `status show${isError ? " error" : ""}`;
    }

    function hideStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function setLoading(visible, title = "読み込み中…", text = "少し待ってね") {
      if (!loadingOverlay) return;

      loadingTitle.textContent = title;
      loadingText.textContent = text;

      if (visible) {
        loadingOverlay.classList.remove("is-hidden");
      } else {
        loadingOverlay.classList.add("is-hidden");
      }
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function normalizeDate(str) {
      return String(str || "").replace(/\s+/g, "");
    }

    function formatDateISO(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatDateJP(dateStr) {
      const date = new Date(`${dateStr}T00:00:00`);
      const week = ["日", "月", "火", "水", "木", "金", "土"];
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日（${week[date.getDay()]}）`;
    }

    initPage();
  </script>
</body>
</html>
