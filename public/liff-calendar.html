<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>受取日時を選択</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f6f7f9;
      color: #222;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
    }
    .step {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .step span {
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef1f5;
      font-size: 12px;
    }
    .step .active {
      background: #06c755;
      color: #fff;
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .nav button {
      border: none;
      background: #111;
      color: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    .month-label {
      font-weight: 700;
      font-size: 18px;
    }
    .weekdays, .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .weekdays div {
      text-align: center;
      font-size: 12px;
      color: #777;
      padding: 4px 0;
    }
    .day, .blank {
      min-height: 62px;
      border-radius: 14px;
    }
    .blank {
      background: transparent;
    }
    .day {
      border: 1px solid #e2e6ea;
      background: #fafbfc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: pointer;
      position: relative;
    }
    .day.disabled {
      color: #c0c4c9;
      background: #f1f3f5;
      cursor: not-allowed;
    }
    .day.available {
      background: #fff;
      border: 2px solid #06c75533;
    }
    .day.selected {
      background: #06c755;
      color: #fff;
      border-color: #06c755;
    }
    .section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
    .hidden {
      display: none;
    }
    .confirm-box {
      background: #f7faf8;
      border: 1px solid #d9efe1;
      border-radius: 14px;
      padding: 14px;
    }
    .confirm-date {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: #06c755;
      color: #fff;
    }
    .btn-secondary {
      background: #eceff3;
      color: #222;
    }
    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .time-btn {
      border: 1px solid #dfe4ea;
      background: #fff;
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
    }
    .time-btn.selected {
      background: #06c755;
      color: #fff;
      border-color: #06c755;
    }
    .final-box {
      margin-top: 14px;
      background: #fff9ed;
      border: 1px solid #f0dfb4;
      border-radius: 14px;
      padding: 14px;
    }
    .final-box strong {
      display: block;
      margin-bottom: 8px;
    }
    .send-area {
      margin-top: 14px;
    }
    .send-area button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #111;
      color: #fff;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .send-area button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    @media (max-width: 520px) {
      .time-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .day, .blank {
        min-height: 54px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title" id="titleText">受取日時を選択</div>
      <div class="sub">ご希望の受取日と時間をお選びください</div>

      <div class="step" id="stepBar">
        <span class="active">1. 日付</span>
        <span>2. 確認</span>
        <span>3. 時間</span>
        <span>4. 送信</span>
      </div>

      <div class="nav">
        <button id="prevBtn">← 前月</button>
        <div class="month-label" id="monthLabel"></div>
        <button id="nextBtn">次月 →</button>
      </div>

      <div class="weekdays">
        <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
      </div>
      <div class="calendar" id="calendar"></div>

      <div class="section hidden" id="dateConfirmSection">
        <div class="confirm-box">
          <div class="confirm-date" id="selectedDateText"></div>
          <div class="btn-row">
            <button class="btn btn-primary" id="confirmDateBtn">この日でOK</button>
            <button class="btn btn-secondary" id="reselectDateBtn">日付を選び直す</button>
          </div>
        </div>
      </div>

      <div class="section hidden" id="timeSection">
        <div style="font-weight:700; font-size:18px;">受取時間を選択</div>
        <div class="sub" id="timeSubText">時間をお選びください</div>
        <div class="time-grid" id="timeGrid"></div>

        <div class="final-box hidden" id="finalBox">
          <strong>この内容で送信します</strong>
          <div id="finalText"></div>
        </div>

        <div class="send-area">
          <button id="sendBtn" disabled>この内容で送信する</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = window.LIFF_ID || "YOUR_LIFF_ID";
    const STORE_NAME = window.STORE_NAME || "かむらど";

    const AVAILABLE_DATES = new Set(
      (window.AVAILABLE_DATES || []).map(normalizeDate)
    );

    const TIME_SLOTS = window.TIME_SLOTS || [
      "11:30", "12:00", "12:30",
      "13:00", "13:30", "14:00",
      "17:30", "18:00", "18:30", "19:00"
    ];

    let currentDate = new Date();
    currentDate.setDate(1);

    let selectedDate = "";
    let selectedTime = "";

    document.getElementById("titleText").textContent = `${STORE_NAME} 受取日時選択`;

    document.getElementById("prevBtn").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    document.getElementById("confirmDateBtn").addEventListener("click", () => {
      document.getElementById("timeSection").classList.remove("hidden");
      document.getElementById("timeSubText").textContent = `${formatDateJP(selectedDate)} の受取時間を選んでください`;
      renderTimeSlots();
      setStep(3);
    });

    document.getElementById("reselectDateBtn").addEventListener("click", () => {
      document.getElementById("dateConfirmSection").classList.add("hidden");
      document.getElementById("timeSection").classList.add("hidden");
      document.getElementById("finalBox").classList.add("hidden");
      selectedTime = "";
      document.getElementById("sendBtn").disabled = true;
      setStep(1);
    });

    document.getElementById("sendBtn").addEventListener("click", async () => {
      if (!selectedDate || !selectedTime) return;

      try {
        await liff.sendMessages([
          {
            type: "text",
            text: `予約日時|${selectedDate}|${selectedTime}`
          }
        ]);
        liff.closeWindow();
      } catch (err) {
        alert("送信に失敗しました: " + (err?.message || err));
      }
    });

    async function initLiff() {
      await liff.init({ liffId: LIFF_ID });
      renderCalendar();
    }

    function setStep(step) {
      const spans = [...document.querySelectorAll("#stepBar span")];
      spans.forEach((el, idx) => {
        el.classList.toggle("active", idx < step);
      });
    }

    function renderCalendar() {
      const calendar = document.getElementById("calendar");
      calendar.innerHTML = "";

      const y = currentDate.getFullYear();
      const m = currentDate.getMonth();

      document.getElementById("monthLabel").textContent = `${y}年 ${m + 1}月`;

      const firstDay = new Date(y, m, 1).getDay();
      const lastDate = new Date(y, m + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const blank = document.createElement("div");
        blank.className = "blank";
        calendar.appendChild(blank);
      }

      for (let day = 1; day <= lastDate; day++) {
        const dateStr = formatDateISO(new Date(y, m, day));
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "day";

        const available = AVAILABLE_DATES.has(dateStr);
        cell.textContent = day;

        if (!available) {
          cell.classList.add("disabled");
          cell.disabled = true;
        } else {
          cell.classList.add("available");
          if (selectedDate === dateStr) {
            cell.classList.add("selected");
          }

          cell.addEventListener("click", () => {
            selectedDate = dateStr;
            selectedTime = "";
            renderCalendar();

            document.getElementById("dateConfirmSection").classList.remove("hidden");
            document.getElementById("timeSection").classList.add("hidden");
            document.getElementById("finalBox").classList.add("hidden");
            document.getElementById("sendBtn").disabled = true;
            document.getElementById("selectedDateText").textContent =
              `${formatDateJP(selectedDate)} でよろしいですか？`;

            setStep(2);
          });
        }

        calendar.appendChild(cell);
      }
    }

    function renderTimeSlots() {
      const timeGrid = document.getElementById("timeGrid");
      timeGrid.innerHTML = "";

      TIME_SLOTS.forEach((time) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "time-btn";
        btn.textContent = time;

        if (selectedTime === time) {
          btn.classList.add("selected");
        }

        btn.addEventListener("click", () => {
          selectedTime = time;
          renderTimeSlots();

          document.getElementById("finalBox").classList.remove("hidden");
          document.getElementById("finalText").textContent =
            `${formatDateJP(selectedDate)} / ${selectedTime}`;
          document.getElementById("sendBtn").disabled = false;
          setStep(4);
        });

        timeGrid.appendChild(btn);
      });
    }

    function normalizeDate(str) {
      return String(str || "").replace(/\s+/g, "");
    }

    function formatDateISO(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatDateJP(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      const week = ["日", "月", "火", "水", "木", "金", "土"];
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${week[d.getDay()]}）`;
    }

    initLiff();
  </script>
</body>
</html>
